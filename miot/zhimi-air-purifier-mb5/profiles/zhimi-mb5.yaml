name: zhimi-mb5
components:
- id: main
  capabilities:
  - id: switch
    version: 1
  - id: connectamber53538.zhimiairpurifierfanmode
    version: 1
  - id: connectamber53538.zhimiairpurifierfanspeed
    version: 1
  - id: temperatureMeasurement
    version: 1
  - id: relativeHumidityMeasurement
    version: 1
  - id: fineDustSensor
    version: 1
  - id: filterState
    version: 1
  - id: refresh
    version: 1
  categories:
  - name: AirPurifier
deviceConfig:
  dashboard:
    states:
      - component: main
        capability: switch
        version: 1
        group: main
        values:
          - label: "{{switch.value}}"
        composite: true
      - component: main
        capability: fineDustSensor
        version: 1
        group: main
        values:
          - label: " PM2.5: {{fineDustLevel.value}}"
        composite: true
    actions:
      - component: main
        capability: switch
        version: 1
    basicPlus: []
  detailView:
    - component: main
      capability: switch
      version: 1
    - component: main
      capability: connectamber53538.zhimiairpurifierfanmode
      version: 1
    - component: main
      capability: connectamber53538.zhimiairpurifierfanspeed
      version: 1
    - component: main
      capability: fineDustSensor
      version: 1
    - component: main
      capability: temperatureMeasurement
      version: 1
    - component: main
      capability: relativeHumidityMeasurement
      version: 1
    - component: main
      capability: filterState
      version: 1
    - component: main
      capability: refresh
      version: 1
  automation:
    conditions:
      - component: main
        capability: switch
        version: 1
      - component: main
        capability: connectamber53538.zhimiairpurifierfanmode
        version: 1
      - component: main
        capability: connectamber53538.zhimiairpurifierfanspeed
        version: 1
      - component: main
        capability: fineDustSensor
        version: 1
      - component: main
        capability: temperatureMeasurement
        version: 1
      - component: main
        capability: relativeHumidityMeasurement
        version: 1
      - component: main
        capability: filterState
        version: 1
    actions:
      - component: main
        capability: switch
        version: 1
      - component: main
        capability: connectamber53538.zhimiairpurifierfanmode
        version: 1
      - component: main
        capability: connectamber53538.zhimiairpurifierfanspeed
        version: 1

preferences:
- name: ipAddress
  title: IP Address
  description: Zhimi Air Purifier의 IP 주소
  required: true
  preferenceType: string
  definition:
    stringType: text
    default: ""
- name: token
  title: Token
  description: Zhimi Air Purifier의 토큰 (32자)
  required: true
  preferenceType: string
  definition:
    stringType: text
    default: ""
- name: pollingInterval
  title: 갱신주기 (초)
  description: 얼마나 자주 갱신할지 설정 (기본값 60초)
  required: false
  preferenceType: integer
  definition:
    minimum: 30
    maximum: 300
    default: 60
- name: createDev
  title: 추가 기기 만들기
  description: on off 전환시 또다른 공기청정기 기기를 생성합니다.
  required: false
  preferenceType: boolean
  definition:
    default: false
